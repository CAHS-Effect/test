name = "cahs-and-effect"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

pages_build_output_dir = "."

[vars]
# Add these as secrets in Cloudflare dashboard:
# Pages → Settings → Environment Variables → Add variable (mark as Secret)
#
# TURSO_URL      — your Turso database URL  (e.g. libsql://your-db.turso.io)
# TURSO_TOKEN    — your Turso auth token
# CMS_SECRET     — any strong password you choose (protects write endpoints)
